[dependency-groups]
dev = [
    "fastapi",
    "ruff==0.15.11",
    "ty==0.0.31",
    "uvicorn",
]

[tool.uv.workspace]
members = ["pythonlib", "ml-models", "__tests__"]

[tool.ty.analysis]
allowed-unresolved-imports = ["maxminddb"]

[tool.ty.environment]
python = ".venv"
python-version = "3.10"

[tool.ty.src]
exclude = ["pythonlib/rotunda/gui/**"]

[tool.ty.terminal]
output-format = "concise"
