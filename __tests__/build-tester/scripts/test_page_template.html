<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rotunda Check</title>
</head>
<body>
<script src="/checks-bundle.js"></script>
<script>
(async function () {
  try {
    var results = await RotundaChecks.runAllChecks();
    window.__testResults__ = results;
    window.__testComplete__ = true;
  } catch (e) {
    window.__testError__ = String(e);
    window.__testComplete__ = true;
  }
})();
</script>
</body>
</html>
