name: Python Checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pythonlib/pyproject.toml
            pythonlib/uv.lock

      - name: Sync Python dev environment
        working-directory: pythonlib
        run: uv sync --group dev --locked

      - name: Run Ruff
        working-directory: pythonlib
        run: uv run --project . ruff check camoufox

  ty:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pythonlib/pyproject.toml
            pythonlib/uv.lock

      - name: Sync Python dev environment
        working-directory: pythonlib
        run: uv sync --group dev --locked

      - name: Run ty
        working-directory: pythonlib
        run: uv run --project . ty check camoufox

  pytest:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pythonlib/pyproject.toml
            pythonlib/uv.lock

      - name: Sync Python test environment
        run: uv sync --project pythonlib --group dev --locked

      - name: Run Python tests
        run: uv run --project pythonlib --group dev pytest __tests_
