name: Build macOS Native

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  push:
    tags:
      - "*"
  release:
    types: [published]

concurrency:
  group: build-macos-native-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-build')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-26
          - arch: x86_64
            runner: macos-26-intel

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve Camoufox release version
        id: camoufox-release
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: bash .github/scripts/resolve-release-version.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          brew update
          brew install aria2 ccache

      - name: Check native toolchain
        run: |
          uname -a
          xcodebuild -version
          macos_sdk="$(xcrun --sdk macosx --show-sdk-path)"
          echo "$macos_sdk"
          echo "MACOS_SDK_DIR=$macos_sdk" >> "$GITHUB_ENV"
          df -h

      - name: Fetch source
        env:
          CAMOUFOX_PASSWD: ${{ secrets.CAMOUFOX_PASSWD }}
        run: make fetch

      - name: Setup and bootstrap
        env:
          BUILD_TARGET: macos,${{ matrix.arch }}
        run: |
          make setup-minimal
          make set-target
          make mozbootstrap
          mkdir -p dist

      - name: Build
        run: python3 ./multibuild.py --target macos --arch ${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CamoufoxBuilds-macos-${{ matrix.arch }}
          path: dist/*

      - name: Debug failed build over SSH
        if: ${{ failure() }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 60
        with:
          limit-access-to-actor: true

  integration-macos:
    needs: build-macos
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-build')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-26
          - arch: x86_64
            runner: macos-26-intel

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            __tests__/playwright/pyproject.toml
            __tests__/playwright/uv.lock

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: CamoufoxBuilds-macos-${{ matrix.arch }}
          path: dist-artifact

      - name: Sync Playwright integration environment
        run: uv sync --project __tests__/playwright --locked

      - name: Resolve Camoufox executable
        id: artifact
        run: |
          python3 scripts/resolve_ci_artifact.py \
            --artifact dist-artifact \
            --extract-dir .tmp/ci-artifacts/macos-${{ matrix.arch }} \
            --github-output "$GITHUB_OUTPUT"

      - name: Run Playwright integration tests
        env:
          CAMOUFOX_EXECUTABLE_PATH: ${{ steps.artifact.outputs.executable_path }}
        run: |
          uv run --project __tests__/playwright --locked pytest \
            --integration \
            --headless \
            __tests__/playwright/async/

  release-macos:
    needs: [build-macos, integration-macos]
    if: github.event_name == 'push' || github.event_name == 'release'
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: CamoufoxBuilds-macos-*
          path: artifacts
          merge-multiple: true

      - name: Verify release assets
        run: ls -lah artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          files: artifacts/*.zip
          generate_release_notes: true
          draft: ${{ github.event_name == 'push' }}
          prerelease: ${{ github.event_name == 'release' && github.event.release.prerelease || false }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
