name: Build and Release

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  push:
    tags:
      - "*"
  release:
    types: [published]

concurrency:
  group: build-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-build')
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [linux]
        arch: [x86_64, arm64]

    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v4.1
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"
          verbose: "false"

      - name: Remove unwanted tools
        # Originally from here: https://github.com/AdityaGarg8/remove-unwanted-software/blob/master/action.yml
        run: |
          sudo apt-get remove -y '^aspnetcore-.*' > /dev/null
          sudo apt-get remove -y '^dotnet-.*' > /dev/null
          sudo apt-get remove -y '^llvm-.*' > /dev/null
          sudo apt-get remove -y 'php.*' > /dev/null
          sudo apt-get remove -y '^mongodb-.*' > /dev/null
          sudo apt-get remove -y '^mysql-.*' > /dev/null
          sudo apt-get remove -y azure-cli google-chrome-stable firefox ${POWERSHELL} mono-devel libgl1-mesa-dri --fix-missing > /dev/null
          if [[ (${CODENAME} = focal) || (${CODENAME} = jammy) ]]; then
            sudo apt-get remove -y google-cloud-sdk --fix-missing > /dev/null
            sudo apt-get remove -y google-cloud-cli --fix-missing > /dev/null
          fi
          sudo apt-get autoremove -y > /dev/null
          sudo apt-get clean > /dev/null

      - uses: actions/checkout@v2
        with:
          fetch-depth: 1

      - name: Resolve Camoufox release version
        id: camoufox-release
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: bash .github/scripts/resolve-release-version.sh

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.11"

      - name: Set up LLVM
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y lld-18 clang-18
          if [ "${{ matrix.arch }}" != "x86_64" ]; then
            sudo apt-get install -y libc6-i386 lib32gcc-s1 lib32stdc++6 gcc-multilib g++-multilib
          fi
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-18 100

      - name: Check disk space
        run: df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full aria2 ccache unzip

      - name: Fetch source
        env:
          CAMOUFOX_PASSWD: ${{ secrets.CAMOUFOX_PASSWD }}
        run: |
          make fetch

      - name: Setup and bootstrap
        run: |
          make setup-minimal
          make mozbootstrap
          mkdir -p dist

      - name: Create swap space
        run: |
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Build
        run: python3 ./multibuild.py --target ${{ matrix.target }} --arch ${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CamoufoxBuilds-${{ matrix.target }}-${{ matrix.arch }}
          path: dist/*

      - name: Debug failed build over SSH
        if: ${{ failure() }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 60
        with:
          limit-access-to-actor: true

  integration-linux:
    needs: build
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-build')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            __tests__/playwright/pyproject.toml
            __tests__/playwright/uv.lock

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: CamoufoxBuilds-linux-${{ matrix.arch }}
          path: dist-artifact

      - name: Sync Playwright integration environment
        run: uv sync --project __tests__/playwright --locked

      - name: Install Linux runtime dependencies
        run: uv run --project __tests__/playwright --locked playwright install-deps firefox

      - name: Resolve Camoufox executable
        id: artifact
        run: |
          python3 scripts/resolve_ci_artifact.py \
            --artifact dist-artifact \
            --extract-dir .tmp/ci-artifacts/linux-${{ matrix.arch }} \
            --github-output "$GITHUB_OUTPUT"

      - name: Run Playwright integration tests
        env:
          CAMOUFOX_EXECUTABLE_PATH: ${{ steps.artifact.outputs.executable_path }}
        run: |
          uv run --project __tests__/playwright --locked pytest \
            --integration \
            --headless \
            __tests__/playwright/async/

  release:
    needs: [build, integration-linux]
    if: github.event_name == 'push' || github.event_name == 'release'
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: CamoufoxBuilds-linux-*
          path: artifacts
          merge-multiple: true

      - name: Verify release assets
        run: |
          echo "PWD=$(pwd)"
          echo "Artifacts directory tree:"
          find artifacts -maxdepth 3 -print | sort
          echo ""
          echo "Artifacts directory listing:"
          ls -lah artifacts || true
          echo ""
          echo "ZIP files that will be uploaded:"
          find artifacts -maxdepth 1 -type f -name '*.zip' -print | sort
          echo ""
          echo "SHA256 for ZIP files:"
          shasum -a 256 artifacts/*.zip || true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          files: artifacts/*.zip
          generate_release_notes: true
          draft: ${{ github.event_name == 'push' }}
          prerelease: ${{ github.event_name == 'release' && github.event.release.prerelease || false }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summarize uploaded asset inputs
        if: always()
        run: |
          echo "Release upload step completed."
          echo "Expected upload glob: artifacts/*.zip"
          echo "Final on-disk ZIP files:"
          find artifacts -maxdepth 1 -type f -name '*.zip' -print | sort
