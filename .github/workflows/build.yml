name: Build and Release

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  push:
    tags:
      - "*"
  release:
    types: [published]

concurrency:
  group: build-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-build')
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [linux, windows, macos]
        arch: [x86_64, arm64, i686]
        exclude:
          # Fails (.mozbuild does not include clang++-cl)
          - target: windows
            arch: arm64
          # Unsuported
          - target: macos
            arch: i686

    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v4.1
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"
          verbose: "false"

      - name: Remove unwanted tools
        # Originally from here: https://github.com/AdityaGarg8/remove-unwanted-software/blob/master/action.yml
        run: |
          sudo apt-get remove -y '^aspnetcore-.*' > /dev/null
          sudo apt-get remove -y '^dotnet-.*' > /dev/null
          sudo apt-get remove -y '^llvm-.*' > /dev/null
          sudo apt-get remove -y 'php.*' > /dev/null
          sudo apt-get remove -y '^mongodb-.*' > /dev/null
          sudo apt-get remove -y '^mysql-.*' > /dev/null
          sudo apt-get remove -y azure-cli google-chrome-stable firefox ${POWERSHELL} mono-devel libgl1-mesa-dri --fix-missing > /dev/null
          if [[ (${CODENAME} = focal) || (${CODENAME} = jammy) ]]; then
            sudo apt-get remove -y google-cloud-sdk --fix-missing > /dev/null
            sudo apt-get remove -y google-cloud-cli --fix-missing > /dev/null
          fi
          sudo apt-get autoremove -y > /dev/null
          sudo apt-get clean > /dev/null

      - uses: actions/checkout@v2
        with:
          fetch-depth: 1

      - name: Resolve Camoufox release version
        id: camoufox-release
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: bash .github/scripts/resolve-release-version.sh

      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: "1.23"

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.11"

      - name: Set up LLVM
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y lld-18 clang-18
          if [ "${{ matrix.arch }}" != "x86_64" ]; then
            sudo apt-get install -y libc6-i386 lib32gcc-s1 lib32stdc++6 gcc-multilib g++-multilib
          fi
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-18 100

      - name: Check disk space
        run: df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y msitools p7zip-full aria2 ccache unzip

      - name: Fetch source
        env:
          CAMOUFOX_PASSWD: ${{ secrets.CAMOUFOX_PASSWD }}
        run: |
          make fetch

      - name: Setup and bootstrap
        run: |
          make setup-minimal
          make mozbootstrap
          mkdir -p dist

      - name: Create swap space
        run: |
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Prepare Windows App SDK
        if: ${{ matrix.target == 'windows' }}
        run: |
          set -euxo pipefail

          case "${{ matrix.arch }}" in
            i686)
              wasdk_arch=x86
              moz_cpu=x86
              ;;
            x86_64)
              wasdk_arch=x64
              moz_cpu=x86_64
              ;;
            arm64)
              wasdk_arch=arm64
              moz_cpu=aarch64
              ;;
            *)
              echo "Unsupported Windows arch: ${{ matrix.arch }}" >&2
              exit 1
              ;;
          esac

          wasdk_root="$HOME/.mozbuild/winappsdk-${moz_cpu}-pc-windows-msvc"
          wasdk_tmp="$RUNNER_TEMP/windows-app-sdk"
          rm -rf "$wasdk_root" "$wasdk_tmp"
          mkdir -p "$wasdk_root" "$wasdk_tmp"

          curl -L \
            -o "$wasdk_tmp/Microsoft.WindowsAppRuntime.Redist.2.0.1.zip" \
            "https://aka.ms/windowsappsdk/2.0/2.0.1/Microsoft.WindowsAppRuntime.Redist.2.0.zip"

          unzip -q \
            "$wasdk_tmp/Microsoft.WindowsAppRuntime.Redist.2.0.1.zip" \
            "MSIX/win10-${wasdk_arch}/*.msix" \
            -d "$wasdk_tmp"

          for msix in "$wasdk_tmp"/MSIX/win10-"${wasdk_arch}"/*.msix; do
            unzip -oq "$msix" -d "$wasdk_root"
          done

          test -n "$(find "$wasdk_root" -maxdepth 1 -name '*.dll' -print -quit)"
          echo "MOZ_WINDOWS_APP_SDK_DIR=$wasdk_root" >> "$GITHUB_ENV"

      - name: Build
        run: python3 ./multibuild.py --target ${{ matrix.target }} --arch ${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CamoufoxBuilds-${{ matrix.target }}-${{ matrix.arch }}
          path: dist/*

      - name: Debug failed build over SSH
        if: ${{ failure() }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30
        with:
          limit-access-to-actor: true

  release:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'release'
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          files: artifacts/**/*
          generate_release_notes: true
          draft: ${{ github.event_name == 'push' }}
          prerelease: ${{ github.event_name == 'release' && github.event.release.prerelease || false }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
