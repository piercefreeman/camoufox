name: Build macOS Artifacts

on:
  workflow_dispatch:
    inputs:
      release:
        description: Release suffix to use instead of upstream.sh
        required: false
        type: string
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
  push:
    tags:
      - "*"

jobs:
  metadata:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-build')
    runs-on: ubuntu-latest
    outputs:
      browser_version: ${{ steps.meta.outputs.browser_version }}
      build_release: ${{ steps.meta.outputs.build_release }}
      bundled_version: ${{ steps.meta.outputs.bundled_version }}

    steps:
      - uses: actions/checkout@v4

      - id: meta
        name: Resolve bundled version metadata
        env:
          MANUAL_RELEASE: ${{ github.event.inputs.release || '' }}
        shell: bash
        run: |
          set -euo pipefail

          source upstream.sh

          build_release="$release"
          if [[ -n "$MANUAL_RELEASE" ]]; then
            build_release="$MANUAL_RELEASE"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            build_release="0.0.1"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            build_release="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$build_release" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Invalid build release: $build_release"
            echo "Use only letters, numbers, dots, underscores, and hyphens."
            exit 1
          fi

          bundled_version="${version}-${build_release}"

          echo "browser_version=$version" >> "$GITHUB_OUTPUT"
          echo "build_release=$build_release" >> "$GITHUB_OUTPUT"
          echo "bundled_version=$bundled_version" >> "$GITHUB_OUTPUT"

  build:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-build')
    needs: metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-26-intel
          - arch: arm64
            runner: macos-26

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Homebrew dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install aria2 p7zip ccache lld

      - name: Check runner environment
        run: |
          uname -a
          df -h
          xcode-select -p
          xcodebuild -version
          xcrun --find actool
          xcrun --show-sdk-version
          which ld.lld || true
          which ld64.lld || true

      - name: Fetch source
        env:
          CAMOUFOX_PASSWD: ${{ secrets.CAMOUFOX_PASSWD }}
          BROWSER_VERSION: ${{ needs.metadata.outputs.browser_version }}
          BUILD_RELEASE: ${{ needs.metadata.outputs.build_release }}
        run: make fetch version="$BROWSER_VERSION" release="$BUILD_RELEASE"

      - name: Setup and bootstrap
        env:
          BROWSER_VERSION: ${{ needs.metadata.outputs.browser_version }}
          BUILD_RELEASE: ${{ needs.metadata.outputs.build_release }}
        run: |
          make setup-minimal version="$BROWSER_VERSION" release="$BUILD_RELEASE"
          mkdir -p dist

      - name: Build and package macOS artifact
        env:
          BROWSER_VERSION: ${{ needs.metadata.outputs.browser_version }}
          BUILD_RELEASE: ${{ needs.metadata.outputs.build_release }}
          CAMOUFOX_DISABLE_BOOTSTRAP: "1"
        run: |
          export BUILD_TARGET="macos,${{ matrix.arch }}"
          make build version="$BROWSER_VERSION" release="$BUILD_RELEASE"
          make package-macos arch="${{ matrix.arch }}" version="$BROWSER_VERSION" release="$BUILD_RELEASE"
          mv "camoufox-${BROWSER_VERSION}-${BUILD_RELEASE}-mac.${{ matrix.arch }}.zip" dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Camoufox-${{ needs.metadata.outputs.bundled_version }}-mac.${{ matrix.arch }}
          path: dist/camoufox-${{ needs.metadata.outputs.bundled_version }}-mac.${{ matrix.arch }}.zip

  release:
    needs: [metadata, build]
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Camoufox ${{ needs.metadata.outputs.bundled_version }}
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
