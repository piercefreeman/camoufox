name: Build and Release

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  push:
    tags:
      - "*"
  release:
    types: [published]

concurrency:
  group: build-${{ github.event.release.tag_name || github.ref_name || github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Ensure tag release exists
        if: github.event_name == 'push' || github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
            exit 0
          fi

          if [ "${{ github.event_name }}" != "push" ]; then
            echo "Release $RELEASE_TAG does not exist for event ${{ github.event_name }}." >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" --draft --generate-notes --verify-tag

      - name: Skip release bootstrap
        if: github.event_name != 'push' && github.event_name != 'release'
        run: echo "Release bootstrap is not required for ${GITHUB_EVENT_NAME}."

  build:
    needs: prepare-release
    name: Build ${{ matrix.target }} ${{ matrix.arch }}
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-build')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            arch: x86_64
            runner: ubuntu-24.04
          - target: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - target: macos
            arch: arm64
            runner: macos-26
          - target: macos
            arch: x86_64
            runner: macos-26-intel

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Maximize build space
        if: matrix.target == 'linux'
        uses: AdityaGarg8/remove-unwanted-software@v4.1
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"
          verbose: "false"

      - name: Remove unwanted tools
        if: matrix.target == 'linux'
        # Originally from here: https://github.com/AdityaGarg8/remove-unwanted-software/blob/master/action.yml
        run: |
          sudo apt-get remove -y '^aspnetcore-.*' > /dev/null
          sudo apt-get remove -y '^dotnet-.*' > /dev/null
          sudo apt-get remove -y '^llvm-.*' > /dev/null
          sudo apt-get remove -y 'php.*' > /dev/null
          sudo apt-get remove -y '^mongodb-.*' > /dev/null
          sudo apt-get remove -y '^mysql-.*' > /dev/null
          sudo apt-get remove -y azure-cli google-chrome-stable firefox ${POWERSHELL} mono-devel libgl1-mesa-dri --fix-missing > /dev/null
          if [[ (${CODENAME} = focal) || (${CODENAME} = jammy) ]]; then
            sudo apt-get remove -y google-cloud-sdk --fix-missing > /dev/null
            sudo apt-get remove -y google-cloud-cli --fix-missing > /dev/null
          fi
          sudo apt-get autoremove -y > /dev/null
          sudo apt-get clean > /dev/null

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve Camoufox release version
        id: camoufox-release
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: bash .github/scripts/resolve-release-version.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up LLVM
        if: matrix.target == 'linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y lld-18 clang-18
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-18 100

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full aria2 ccache unzip

      - name: Install macOS dependencies
        if: matrix.target == 'macos'
        run: |
          brew update
          brew install aria2 ccache

      - name: Check Linux disk space
        if: matrix.target == 'linux'
        run: df -h

      - name: Check macOS native toolchain
        if: matrix.target == 'macos'
        run: |
          uname -a
          xcodebuild -version
          macos_sdk="$(xcrun --sdk macosx --show-sdk-path)"
          echo "$macos_sdk"
          echo "MACOS_SDK_DIR=$macos_sdk" >> "$GITHUB_ENV"
          df -h

      - name: Fetch source
        env:
          CAMOUFOX_PASSWD: ${{ secrets.CAMOUFOX_PASSWD }}
        run: |
          make fetch

      - name: Setup and bootstrap for Linux
        if: matrix.target == 'linux'
        run: |
          make setup-minimal
          make mozbootstrap
          mkdir -p dist

      - name: Setup and bootstrap for macOS
        if: matrix.target == 'macos'
        env:
          BUILD_TARGET: ${{ matrix.target }},${{ matrix.arch }}
        run: |
          make setup-minimal
          make set-target
          make mozbootstrap
          mkdir -p dist

      - name: Create swap space
        if: matrix.target == 'linux'
        run: |
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Build
        run: python3 ./multibuild.py --target ${{ matrix.target }} --arch ${{ matrix.arch }}

      - name: Inspect built archives
        run: |
          echo "PWD=$(pwd)"
          echo "dist tree:"
          find dist -maxdepth 3 -print | sort
          echo ""
          echo "dist listing:"
          ls -lah dist
          echo ""
          echo "ZIP files:"
          find dist -maxdepth 1 -type f -name '*.zip' -print | sort
          echo ""
          echo "SHA256:"
          shasum -a 256 dist/*.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CamoufoxBuilds-${{ matrix.target }}-${{ matrix.arch }}
          path: dist/*.zip
          if-no-files-found: error

      - name: Upload release asset
        if: github.event_name == 'push' || github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets found in dist." >&2
            exit 1
          fi
          printf 'Uploading release assets for %s:\n' "$RELEASE_TAG"
          printf '%s\n' "${files[@]}"
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber

      - name: Debug failed build over SSH
        if: ${{ failure() }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 60
        with:
          limit-access-to-actor: true

  integration:
    needs: build
    name: Integration ${{ matrix.target }} ${{ matrix.arch }}
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-build')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            arch: x86_64
            runner: ubuntu-24.04
          - target: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - target: macos
            arch: arm64
            runner: macos-26
          - target: macos
            arch: x86_64
            runner: macos-26-intel

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: CamoufoxBuilds-${{ matrix.target }}-${{ matrix.arch }}
          path: dist-artifact

      - name: Inspect downloaded build artifact
        run: |
          echo "PWD=$(pwd)"
          echo "Artifact tree:"
          find dist-artifact -maxdepth 3 -print | sort
          echo ""
          echo "Artifact listing:"
          ls -lah dist-artifact
          echo ""
          echo "ZIP files:"
          find dist-artifact -maxdepth 1 -type f -name '*.zip' -print | sort
          echo ""
          echo "SHA256:"
          shasum -a 256 dist-artifact/*.zip

      - name: Sync integration test environment
        run: uv sync --group dev --group playwright-tests --locked

      - name: Install Linux runtime dependencies
        if: matrix.target == 'linux'
        run: uv run --group dev --group playwright-tests --locked playwright install-deps firefox

      - name: Resolve Camoufox executable
        id: artifact
        run: |
          python3 scripts/resolve_ci_artifact.py \
            --artifact dist-artifact \
            --extract-dir .tmp/ci-artifacts/${{ matrix.target }}-${{ matrix.arch }} \
            --github-output "$GITHUB_OUTPUT"

      - name: Run integration tests
        env:
          CAMOUFOX_EXECUTABLE_PATH: ${{ steps.artifact.outputs.executable_path }}
        run: |
          uv run --group dev --group playwright-tests --locked pytest \
            --integration \
            --headless \
            __tests__/playwright/async/ \
            __tests__/service-tester/

      - name: Debug failed integration over SSH
        if: ${{ failure() }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 60
        with:
          limit-access-to-actor: true
