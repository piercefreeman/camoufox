name: laptop-keyboard
task: keyboard

data:
  inputs:
    - ../../mouser/recordings
  screen_filter:
    enabled: true
    min_width: 1100
    max_width: 1920
    min_height: 700
    max_height: 1300
    min_aspect_ratio: 1.2
    max_aspect_ratio: 2.2
    require_known: true

training:
  output_dir: Training/runs
  epochs: 25
  batch_size: 32
  hidden_size: 96
  layers: 1
  dropout: 0.0
  lr: 0.001
  weight_decay: 0.0001
  val_fraction: 0.15
  seed: 13
  device: null
  early_stopping_patience: 0
  early_stopping_min_delta: 0.0

keyboard:
  gap_ms: 1000
  keyboard_accessibility_id: auto
  keyboard_max_snapshot_edit_actions: 12
  keyboard_min_final_length: 1
  keyboard_min_duration_ms: 0.0
  keyboard_max_condition_length: 1024
  keyboard_max_steps: 256
  char_embed_size: 32
  action_embed_size: 32
  dt_loss_weight: 1.0
  keyboard_action_loss_weight: 1.0
  keyboard_duration_loss_weight: 1.0
  keyboard_typo_loss_weight: 1.0
  keyboard_typo_action_loss_weight: 1.0
  keyboard_typo_positive_weight: 8.0
  backspace_action_weight: 4.0
  stop_action_weight: 8.0

wandb:
  enabled: false
  log_artifacts: true
